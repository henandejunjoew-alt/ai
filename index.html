<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>起重机出口管家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        tech: { 900: '#0B1120', 800: '#111827', 700: '#1F2937' }
                    },
                    animation: {
                        'shake': 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
                        'scanline': 'scanline 8s linear infinite',
                        'fadeIn': 'fadeIn 0.6s ease-out',
                    },
                    keyframes: {
                        shake: {
                            '10%, 90%': { transform: 'translate3d(-1px, 0, 0)' },
                            '20%, 80%': { transform: 'translate3d(2px, 0, 0)' },
                            '30%, 50%, 70%': { transform: 'translate3d(-4px, 0, 0)' },
                            '40%, 60%': { transform: 'translate3d(4px, 0, 0)' }
                        },
                        scanline: {
                            '0%': { transform: 'translateY(-100%)' },
                            '100%': { transform: 'translateY(100vh)' }
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background:
                radial-gradient(circle at 50% -20%, #1e1b4b, #0f172a, #020617),
                linear-gradient(rgba(56, 189, 248, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(56, 189, 248, 0.04) 1px, transparent 1px);
            background-size: 100% 100%, 40px 40px, 40px 40px;
            background-blend-mode: normal;
            color: #e2e8f0; min-height: 100vh;
            overflow: auto;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.4); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5); transition: all 0.3s ease;
        }
        .scan-line {
            background: linear-gradient(to bottom, transparent, rgba(56, 189, 248, 0.2), transparent);
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(56, 189, 248, 0.3); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(56, 189, 248, 0.6); }
        input, textarea, select {
            background: rgba(0,0,0,0.6) !important;
            border: 1px solid rgba(100,116,139,0.3) !important;
            color: #cbd5e1 !important;
            outline: none !important;
        }
        input:focus, textarea:focus, select:focus {
            border-color: rgba(6,182,212,0.5) !important;
        }
        textarea {
            resize: vertical;
        }
        .btn-cyan {
            background: rgba(6,182,212,0.2);
            border: 1px solid rgba(6,182,212,0.4);
            color: #22d3ee;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-cyan:hover {
            background: rgba(6,182,212,0.35);
        }
        .btn-indigo {
            background: rgba(99,102,241,0.2);
            border: 1px solid rgba(99,102,241,0.4);
            color: #a5b4fc;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-indigo:hover {
            background: rgba(99,102,241,0.35);
        }
        .btn-emerald {
            background: rgba(16,185,129,0.2);
            border: 1px solid rgba(16,185,129,0.4);
            color: #6ee7b7;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-emerald:hover {
            background: rgba(16,185,129,0.35);
        }
        .btn-red {
            background: rgba(239,68,68,0.2);
            border: 1px solid rgba(239,68,68,0.4);
            color: #fca5a5;
            padding: 4px 12px;
            border-radius: 4px;
            font-size: 11px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-red:hover {
            background: rgba(239,68,68,0.35);
        }
        .btn-slate {
            background: rgba(100,116,139,0.2);
            border: 1px solid rgba(100,116,139,0.4);
            color: #94a3b8;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .btn-slate:hover {
            background: rgba(100,116,139,0.35);
        }
    </style>
</head>
<body class="font-sans antialiased selection:bg-cyan-500 selection:text-white">

    <div id="main-content" class="pb-20">

        <!-- ======== 顶部导航 ======== -->
        <header class="sticky top-0 z-50 glass-card border-none rounded-none shadow-2xl backdrop-blur-xl bg-black/60">
            <div class="container mx-auto p-4 flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <h1 class="text-xl font-black tracking-widest text-cyan-400 uppercase">起重机出口管家</h1>
                </div>
                <div class="flex items-center gap-3">
                    <input type="password" id="api-key-input" value="" class="h-8 w-36 text-[11px] tracking-wider px-3" autocomplete="off">
                    <div class="flex items-center gap-2 bg-emerald-900/30 px-4 py-1.5 rounded-full border border-emerald-700/50 flex-shrink-0">
                        <div class="w-2 h-2 rounded-full bg-emerald-400 animate-ping"></div>
                        <span class="text-[10px] text-emerald-400 tracking-wider">系统在线</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="container mx-auto mt-6 px-4 space-y-6">

            <!-- ======== 汇率 + 地区时间查询 ======== -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
                <div class="glass-card rounded-xl px-6 py-5 border-l-4 border-l-cyan-500 flex flex-col justify-center">
                    <div class="text-xs text-slate-400 mb-1">USD/CNY 汇率</div>
                    <div class="text-3xl font-bold text-cyan-400 font-mono tracking-wider" id="usd-cny-rate">获取中...</div>
                </div>
                <div class="glass-card rounded-xl px-6 py-5 border-l-4 border-l-indigo-500 flex flex-col justify-center">
                    <div class="text-xs text-slate-400 mb-2">地区时间查询</div>
                    <div class="flex items-center gap-3">
                        <input type="text" id="city-time-input" class="flex-1 h-9 text-sm px-3">
                        <div id="city-time-result" class="text-sm text-cyan-400 whitespace-nowrap">输入城市名自动查询</div>
                    </div>
                </div>
            </div>

            <!-- ======== 全球时区（两列）======= -->
            <div class="glass-card rounded-xl px-6 py-5 border-l-4 border-l-slate-500">
                <div class="text-xs text-slate-400 mb-3">全球时区</div>
                <div class="grid grid-cols-2 gap-3" id="timezone-grid"></div>
            </div>

            <!-- ======== 翻译模块 ======== -->
            <div class="glass-card rounded-xl p-5 border-l-4 border-l-indigo-500">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-bold text-indigo-300">神经网络翻译 / 行业术语专供</h2>
                    <div class="flex items-center gap-2">
                        <span class="text-xs text-slate-400 bg-black/40 px-3 py-1 rounded border border-white/10">英语</span>
                        <input type="text" id="trans-custom-lang" class="w-24 h-7 text-xs px-2">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div class="flex flex-col gap-2">
                        <textarea id="trans-input" rows="3" class="text-sm"></textarea>
                        <button onclick="mockTranslate()" class="btn-indigo w-full tracking-wider">执行翻译</button>
                    </div>
                    <div class="bg-black/60 rounded border border-indigo-500/30 p-3 flex flex-col relative group">
                        <div class="flex-1 text-sm text-indigo-200" id="trans-output">等待输入数据...</div>
                        <button onclick="copyTranslation()" class="absolute bottom-2 right-2 bg-slate-700 hover:bg-slate-600 text-[10px] px-3 py-1 rounded text-white opacity-0 group-hover:opacity-100 transition">复制</button>
                    </div>
                </div>
            </div>

            <!-- ======== 预测模型 ======== -->
            <div class="rounded-2xl bg-tech-800 relative z-10 border border-blue-500/30 shadow-[0_0_30px_rgba(59,130,246,0.15)]">
                <div class="glass-card rounded-2xl p-0 overflow-hidden border-none bg-tech-900/80">
                    <div class="bg-gradient-to-r from-blue-900/50 to-indigo-900/50 p-4 flex justify-between items-center border-b border-white/5">
                        <h2 class="font-bold text-blue-300 text-sm">预测模型 / 成交概率评估引擎</h2>
                    </div>

                    <div class="p-6 grid grid-cols-1 lg:grid-cols-5 gap-8">
                        <div class="lg:col-span-2 flex flex-col gap-4 lg:pr-8 lg:border-r border-white/10">
                            <div>
                                <label class="block text-[10px] text-slate-400 mb-1">目标实体名称</label>
                                <input type="text" id="in-name" class="w-full">
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="block text-[10px] text-slate-400 mb-1">国家</label><input type="text" id="in-country"></div>
                                <div><label class="block text-[10px] text-slate-400 mb-1">城市</label><input type="text" id="in-city"></div>
                            </div>
                            <div>
                                <label class="block text-[10px] text-slate-400 mb-1">行业</label>
                                <input type="text" id="in-industry" class="w-full">
                            </div>
                            <div class="bg-amber-900/20 border border-amber-500/30 rounded p-2 text-center mt-2">
                                <p class="text-[10px] text-amber-400">AI 演算结果仅供参考，请结合实际商业经验判断。</p>
                            </div>
                            <button onclick="runDiagnosis()" class="w-full bg-gradient-to-r from-blue-600 to-cyan-600 hover:from-blue-500 hover:to-cyan-500 text-white py-3.5 rounded-lg transition transform active:scale-95 text-xs tracking-widest mt-auto border border-cyan-400/50">
                                开始诊断
                            </button>
                        </div>

                        <div class="lg:col-span-3 bg-black/60 rounded-xl p-6 border border-white/5 relative overflow-hidden min-h-[300px]" id="diag-result">
                            <div class="flex flex-col items-center justify-center h-full text-slate-600">
                                <div class="w-10 h-10 border-2 border-slate-700 border-t-cyan-500 rounded-full animate-spin mb-4"></div>
                                <p class="text-[10px] tracking-widest">等待输入参数...</p>
                            </div>
                        </div>
                    </div>

                    <div class="bg-black/40 border-t border-white/5 px-6 py-4">
                        <button onclick="toggleHistory()" class="flex items-center gap-2 text-[10px] text-slate-400 hover:text-cyan-400 transition tracking-widest">
                            <span id="hist-icon" class="text-cyan-500 text-xs">&#9654;</span> 访问历史记录
                        </button>
                        <div id="history-panel" class="hidden mt-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                    </div>
                </div>
            </div>

            <!-- ======== 公司背调 + 地缘预警（两列）======= -->
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-card rounded-xl p-6 border-t-4 border-t-emerald-500">
                    <h3 class="text-emerald-400 text-sm font-bold mb-4">客户公司背调</h3>
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <input type="text" id="comp-name" class="text-sm">
                        <input type="text" id="comp-domain" class="text-sm">
                    </div>
                    <button onclick="analyzeCompanyAI()" class="btn-emerald w-full tracking-wider">
                        开始扫描
                    </button>
                    <div class="mt-4 p-4 bg-black/50 rounded border border-white/5 text-slate-500 text-xs leading-relaxed" id="comp-report-container">
                        > 系统待命...
                    </div>
                </div>

                <div class="glass-card rounded-xl p-6 border-t-4 border-t-red-500 relative overflow-hidden">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-red-400 text-sm font-bold">地缘冲突预警</h3>
                        <button onclick="refreshGeoAlert()" class="btn-red">刷新</button>
                    </div>
                    <div class="space-y-4 text-xs" id="geo-alert-container">
                        <div class="bg-black/50 p-3 rounded border border-red-500/30 border-l-4 border-l-red-500">
                            <p class="font-bold text-slate-200 mb-1">红海危机持续</p>
                            <p class="text-slate-400 text-[10px] leading-relaxed">起重机框架柜舱位极度紧张，发往欧洲/中东航线预计运费维持高位，交期冗余需增加 15 天。</p>
                        </div>
                        <div class="bg-black/50 p-3 rounded border border-amber-500/30 border-l-4 border-l-amber-500">
                            <p class="font-bold text-slate-200 mb-1">拉美关税政策异动</p>
                            <p class="text-slate-400 text-[10px] leading-relaxed">当地正研讨增加重型机械进口保护性关税，建议敦促意向客户尽快落实订单发运。</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ======== 反馈中心 ======== -->
            <div class="glass-card rounded-xl p-6 border border-slate-700 mt-6 bg-black/30">
                <h3 class="font-bold text-xs mb-3 text-slate-400 tracking-widest">系统建设反馈中心</h3>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-start">
                    <div class="md:col-span-3">
                        <textarea id="bug-report" class="w-full text-xs h-16"></textarea>
                    </div>
                    <div class="md:col-span-1 h-full">
                        <button onclick="submitFeedback()" class="btn-slate w-full h-16 tracking-wider">
                            发送
                        </button>
                    </div>
                </div>
            </div>

        </main>
    </div>

    <script>
        // ==========================================
        // 核心 API 配置
        // ==========================================
        const AI_API_URL = "https://api.deepseek.com/v1/chat/completions";
        const AI_MODEL = "deepseek-chat";
        function getApiKey() { const el = document.getElementById('api-key-input'); return el ? el.value.trim() : ''; }

        document.addEventListener('DOMContentLoaded', function() {
            const keyInput = document.getElementById('api-key-input');
            if (keyInput) {
                keyInput.value = sessionStorage.getItem('nexus_api_key') || '';
                keyInput.addEventListener('input', function() {
                    sessionStorage.setItem('nexus_api_key', this.value);
                });
            }
            // 地区时间查询：自动查询
            const cityInput = document.getElementById('city-time-input');
            if (cityInput) {
                let debounceTimer;
                cityInput.addEventListener('input', function() {
                    clearTimeout(debounceTimer);
                    const val = this.value.trim();
                    if (!val) { document.getElementById('city-time-result').innerText = '输入城市名自动查询'; return; }
                    debounceTimer = setTimeout(() => lookupCityTime(val), 800);
                });
            }
        });

        let userHistory = JSON.parse(localStorage.getItem('crane_history_v6') || '[]');

        // ==========================================
        // 地区时间查询
        // ==========================================
        async function lookupCityTime(city) {
            const authKey = getApiKey();
            if (!authKey) { document.getElementById('city-time-result').innerText = '请先输入 API 密钥'; return; }
            const resultDiv = document.getElementById('city-time-result');
            resultDiv.innerText = '查询中...';
            try {
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authKey}` },
                    body: JSON.stringify({
                        model: AI_MODEL,
                        messages: [{"role": "user", "content": `请告诉我"${city}"所在地区的标准时区名称（例如 Asia/Shanghai、Europe/London、America/New_York）。只返回时区名称，不要其他任何内容。`}],
                        temperature: 0
                    })
                });
                if (!response.ok) throw new Error("API 异常");
                const data = await response.json();
                const tz = data.choices[0].message.content.trim();
                // 验证时区是否有效
                try {
                    Intl.DateTimeFormat(undefined, { timeZone: tz });
                } catch(e) {
                    resultDiv.innerText = '无法识别该地区';
                    return;
                }
                const now = new Date();
                const timeStr = now.toLocaleString('zh-CN', { timeZone: tz, hour12: false });
                resultDiv.innerText = timeStr;
            } catch (error) {
                resultDiv.innerText = '查询失败';
            }
        }

        // ==========================================
        // 地缘冲突预警刷新
        // ==========================================
        async function refreshGeoAlert() {
            const authKey = getApiKey();
            if (!authKey) { alert("未检测到 API 密钥，请在顶部输入。"); return; }
            const container = document.getElementById('geo-alert-container');
            container.innerHTML = '<div class="text-xs text-slate-500 animate-pulse py-4 text-center">正在获取最新预警...</div>';
            try {
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authKey}` },
                    body: JSON.stringify({
                        model: AI_MODEL,
                        messages: [{"role": "user", "content": `你是一个地缘政治风险分析师，专门服务起重机出口行业。
请提供当前全球范围内对起重机/重型机械出口有影响的地缘政治事件预警，最多3条。
返回纯JSON格式（不要 markdown 标记）：
{
    "alerts": [
        {
            "level": "critical",
            "title": "事件标题",
            "detail": "事件描述及对起重机出口的影响分析（50字以内）"
        }
    ]
}
注意：level 字段值为 "critical"（严重）或 "warning"（警告）或 "info"（一般）。`}],
                        temperature: 0.5
                    })
                });
                if (!response.ok) throw new Error("API 异常");
                const data = await response.json();
                let rawContent = data.choices[0].message.content.trim();
                const jsonMatch = rawContent.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("JSON 解析失败");
                const result = JSON.parse(jsonMatch[0]);
                const alerts = result.alerts || [];
                if (alerts.length === 0) {
                    container.innerHTML = '<div class="text-xs text-slate-500 py-4 text-center">暂无预警信息</div>';
                    return;
                }
                container.innerHTML = alerts.map(a => {
                    const levelColor = a.level === 'critical' ? 'border-l-red-500 border-red-500/30 text-red-400' : (a.level === 'warning' ? 'border-l-amber-500 border-amber-500/30 text-amber-400' : 'border-l-blue-500 border-blue-500/30 text-blue-400');
                    const titleColor = a.level === 'critical' ? 'text-red-200' : (a.level === 'warning' ? 'text-amber-200' : 'text-blue-200');
                    const bgBorder = a.level === 'critical' ? 'border-red-500/30' : (a.level === 'warning' ? 'border-amber-500/30' : 'border-blue-500/30');
                    return `<div class="bg-black/50 p-3 rounded border ${bgBorder} border-l-4 ${levelColor}">
                        <p class="font-bold ${titleColor} mb-1">${a.title}</p>
                        <p class="text-slate-400 text-[10px] leading-relaxed">${a.detail}</p>
                    </div>`;
                }).join('');
            } catch (error) {
                container.innerHTML = '<div class="text-xs text-red-400 py-4 text-center">刷新失败，请检查网络或 API 密钥</div>';
            }
        }

        // ==========================================
        // 多维度深度 AI 诊断
        // ==========================================
        async function runDiagnosis() {
            const authKey = getApiKey();
            const name = document.getElementById('in-name').value.trim();
            const country = document.getElementById('in-country').value.trim();
            const city = document.getElementById('in-city').value.trim();
            const industry = document.getElementById('in-industry').value.trim();

            if(!authKey) { alert("未检测到 API 密钥，请在顶部输入。"); return; }
            if(!name) { alert("目标实体名称为必填项。"); return; }

            const diagResult = document.getElementById('diag-result');

            diagResult.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-cyan-400 text-xs animate-pulse">
                    <div class="w-12 h-12 border-4 border-slate-800 border-t-cyan-500 rounded-full animate-spin mb-6 shadow-[0_0_15px_rgba(6,182,212,0.5)]"></div>
                    <p class="mb-2 tracking-widest text-sm">正在启动深度分析...</p>
                    <p class="text-[10px] text-slate-500">正在调取地缘政治、外汇管制与重型机械行业交叉数据...</p>
                    <p class="text-[10px] text-slate-500">多维度模型验算中，预计耗时 5-10 秒...</p>
                </div>`;

            const promptText = `
                你是一个拥有20年经验的跨国大客户销售总监和地缘政治专家。
                我现在给你一个潜在线索，请你进行极度专业、详细的深度分析。

                客户/实体名称：${name}
                所在国家：${country || '未提供，请根据名称推测'}
                所在城市：${city || '未提供'}
                所属行业/业务：${industry || '未提供，请根据名称推测，如果不明确，请指出'}

                【核心规则】：
                1. 验真逻辑：如果用户输入的是类似 "cherry", "123", "aaa" 等毫无意义的词汇，或者完全不足以支撑分析，请将 is_valid 设为 false，并在 conclusion 里严肃指出"无效数据"。
                2. 如果数据有效，或者你能够根据名称推测出人种/背景，请务必给出长篇幅的深度分析。

                【必须严格返回以下JSON格式（不要带 markdown 标记）】：
                {
                    "is_valid": true,
                    "tags": ["政府背景", "高外汇风险", "价格敏感"],
                    "dimensions": {
                        "background": "（至少150字）",
                        "finance": "（至少150字）",
                        "logistics": "（至少150字）",
                        "tactic": "（至少150字）"
                    },
                    "conclusion": "用一句话给出一针见血的最终建议。"
                }

                重要：本次分析禁止输出任何评分、分数或百分比数值。只做深度文字分析。
            `;

            try {
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authKey}` },
                    body: JSON.stringify({ model: AI_MODEL, messages: [{"role": "user", "content": promptText}], temperature: 0.3 })
                });

                if (!response.ok) throw new Error("API 异常");

                const data = await response.json();
                let rawContent = data.choices[0].message.content.trim();

                const jsonMatch = rawContent.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("JSON 解析失败: 响应中未找到有效 JSON 结构");
                const aiResult = JSON.parse(jsonMatch[0]);

                if (aiResult.is_valid === false) {
                    diagResult.innerHTML = `
                        <div class="flex flex-col items-center justify-center h-full text-amber-500">
                            <p class="font-bold tracking-widest">数据无效</p>
                            <p class="text-xs text-slate-400 mt-2 text-center max-w-sm leading-relaxed">${aiResult.conclusion}</p>
                        </div>`;
                    return;
                }

                const tagsHtml = aiResult.tags ? aiResult.tags.map(t => `<span class="inline-block bg-cyan-900/30 border border-cyan-500/40 px-3 py-1 rounded-full text-[11px] text-cyan-300 mr-2 mb-1 font-medium tracking-wide">${t}</span>`).join('') : '';

                userHistory.push({ key: authKey, name: name, country: country || '未知', industry: industry || '未知', time: new Date().toLocaleString() });
                localStorage.setItem('crane_history_v7', JSON.stringify(userHistory));

                diagResult.innerHTML = `
                    <div class="relative z-10 animate-fadeIn h-full flex flex-col">

                        <div class="mb-5 border-b border-slate-700 pb-4 shrink-0">
                            <h3 class="font-black text-2xl text-white tracking-wide">${name}</h3>
                            <p class="text-[10px] text-slate-400 mt-1 mb-3 tracking-wide">${country}${city ? ' | '+city : ''}${industry ? ' | '+industry : ''}</p>
                            <div class="flex flex-wrap gap-1">
                                <span class="text-[10px] text-slate-500 mr-1 self-center">情报标签云</span>${tagsHtml}
                            </div>
                        </div>

                        <div class="flex-1 overflow-y-auto pr-2 space-y-4 pb-4">

                            <div class="bg-slate-900/50 p-4 rounded-lg border border-indigo-500/30 border-l-4 border-l-indigo-500 hover:bg-slate-800/80 transition">
                                <p class="text-indigo-400 font-bold mb-2 text-xs tracking-widest">背景与行业深挖</p>
                                <p class="text-slate-300 text-[11px] leading-relaxed">${aiResult.dimensions.background}</p>
                            </div>

                            <div class="bg-slate-900/50 p-4 rounded-lg border border-amber-500/30 border-l-4 border-l-amber-500 hover:bg-slate-800/80 transition">
                                <p class="text-amber-400 font-bold mb-2 text-xs tracking-widest">资金与结算风险</p>
                                <p class="text-slate-300 text-[11px] leading-relaxed">${aiResult.dimensions.finance}</p>
                            </div>

                            <div class="bg-slate-900/50 p-4 rounded-lg border border-red-500/30 border-l-4 border-l-red-500 hover:bg-slate-800/80 transition">
                                <p class="text-red-400 font-bold mb-2 text-xs tracking-widest">地缘与供应链现状</p>
                                <p class="text-slate-300 text-[11px] leading-relaxed">${aiResult.dimensions.logistics}</p>
                            </div>

                            <div class="bg-slate-900/50 p-4 rounded-lg border border-emerald-500/30 border-l-4 border-l-emerald-500 hover:bg-slate-800/80 transition">
                                <p class="text-emerald-400 font-bold mb-2 text-xs tracking-widest">谈判与战术切入</p>
                                <p class="text-slate-300 text-[11px] leading-relaxed">${aiResult.dimensions.tactic}</p>
                            </div>
                        </div>

                        <div class="shrink-0 pt-4 mt-2 border-t border-slate-700">
                            <p class="text-cyan-400 font-bold text-xs tracking-wide">最终参谋建议</p>
                            <p class="text-slate-300 text-[11px] mt-1 italic">${aiResult.conclusion}</p>
                        </div>

                    </div>`;

                loadHistory();

            } catch (error) {
                console.error(error);
                diagResult.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full">
                        <p class="text-red-500 font-bold text-sm tracking-widest mb-3">系统错误</p>
                        <p class="text-red-400/70 text-[10px] text-center max-w-xs leading-relaxed">数据流解析失败。请检查网络连接或 API 密钥额度。若问题持续，请联系系统管理员。</p>
                    </div>`;
            }
        }

        // ==========================================
        // 公司背调
        // ==========================================
        async function analyzeCompanyAI() {
            const authKey = getApiKey();
            const name = document.getElementById('comp-name').value.trim();
            const domain = document.getElementById('comp-domain').value.trim() || '无';

            if(!authKey) { alert("未检测到 API 密钥，请在顶部输入。"); return; }
            if(!name) return;

            const container = document.getElementById('comp-report-container');
            container.innerHTML = '<span class="text-emerald-500 animate-pulse">正在启动扫描...</span>';

            const promptText = `你是企业背调AI。分析公司：${name} 域名：${domain}。返回纯JSON（不要带多余字符）：{"status": "低风险/中风险/高风险", "business": "主营业务(20字)", "suggestion": "建议(30字)"}`;

            try {
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authKey}` },
                    body: JSON.stringify({ model: AI_MODEL, messages: [{"role": "user", "content": promptText}], temperature: 0.5 })
                });
                if (!response.ok) throw new Error("API 异常");
                const data = await response.json();
                let rawContent = data.choices[0].message.content.trim();
                const jsonMatch = rawContent.match(/\{[\s\S]*\}/);
                if (!jsonMatch) throw new Error("JSON 解析失败");
                const aiResult = JSON.parse(jsonMatch[0]);
                let statusColor = aiResult.status.includes('低') ? 'text-emerald-400' : (aiResult.status.includes('高') ? 'text-red-400' : 'text-amber-400');
                container.innerHTML = `<div class="border-l-2 border-emerald-500 pl-3"><p class="${statusColor} font-bold mb-2">综合评定：${aiResult.status}</p><ul class="space-y-1 text-slate-400 text-[10px]"><li>业务推测：${aiResult.business}</li><li>AI 建议：${aiResult.suggestion}</li></ul></div>`;
            } catch (error) {
                container.innerHTML = '<span class="text-red-500">扫描失败，接口调用失败。</span>';
            }
        }

        // ==========================================
        // 历史记录
        // ==========================================
        function loadHistory() {
            const key = getApiKey();
            const panel = document.getElementById('history-panel');
            panel.innerHTML = '';
            const myHistory = userHistory.filter(h => h.key === key);
            if(myHistory.length === 0) { panel.innerHTML = '<p class="text-[10px] text-slate-600">无历史记录</p>'; return; }
            myHistory.reverse().forEach(h => {
                const div = document.createElement('div');
                div.className = 'bg-black/60 p-3 rounded border border-slate-700 hover:border-cyan-500/50 cursor-pointer transition group';
                div.innerHTML = `<div class="font-bold mb-1"><span class="text-slate-300 text-xs group-hover:text-cyan-300">${h.name}</span></div><div class="text-[9px] text-slate-500">${h.country}${h.industry ? ' | '+h.industry : ''}</div>`;
                div.onclick = () => { document.getElementById('in-name').value = h.name; document.getElementById('in-country').value = h.country; document.getElementById('in-industry').value = h.industry; };
                panel.appendChild(div);
            });
        }

        function toggleHistory() {
            const panel = document.getElementById('history-panel');
            const icon = document.getElementById('hist-icon');
            if(panel.classList.contains('hidden')) { loadHistory(); panel.classList.remove('hidden'); icon.innerHTML = '&#9660;'; }
            else { panel.classList.add('hidden'); icon.innerHTML = '&#9654;'; }
        }

        // ==========================================
        // 翻译模块
        // ==========================================
        async function mockTranslate() {
            const authKey = getApiKey();
            const input = document.getElementById('trans-input').value.trim();
            const customLang = document.getElementById('trans-custom-lang').value.trim();
            const targetLang = customLang || '英语';
            if(!authKey) { alert("未检测到 API 密钥，请在顶部输入。"); return; }
            if(!input) return;

            const outputBox = document.getElementById('trans-output');
            outputBox.innerHTML = '<span class="text-indigo-400 animate-pulse">正在翻译...</span>';
            const promptText = `你是起重机出口专家。将以下内容翻译成【${targetLang}】。要求符合专业表达，只返回翻译文本，不要解释。\n原文：${input}`;

            try {
                const response = await fetch(AI_API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authKey}` },
                    body: JSON.stringify({ model: AI_MODEL, messages: [{"role": "user", "content": promptText}], temperature: 0.3 })
                });
                if (!response.ok) throw new Error("API 异常");
                const data = await response.json();
                outputBox.innerText = data.choices[0].message.content.trim();
            } catch (error) {
                outputBox.innerHTML = '<span class="text-red-400">翻译失败，请检查密钥。</span>';
            }
        }

        function copyTranslation() {
            const text = document.getElementById('trans-output').innerText;
            if(text && !text.includes("等待输入") && !text.includes("正在翻译")) navigator.clipboard.writeText(text).then(() => alert("翻译已复制！"));
        }

        // ==========================================
        // 反馈收集
        // ==========================================
        function submitFeedback() {
            const val = document.getElementById('bug-report').value.trim();
            if(!val) return;
            fetch("https://formspree.io/f/xzdybnpg", {
                method: 'POST',
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
                body: JSON.stringify({ "反馈来源": "AI指挥舱", "内容": val, "时间": new Date().toLocaleString() })
            }).then(r => { if(r.ok) { alert("回传成功！"); document.getElementById('bug-report').value = ""; }});
        }

        // ==========================================
        // 汇率 & 全球时区
        // ==========================================

        // 汇率每30秒刷新
        async function fetchExchangeRate() {
            const rateDisplay = document.getElementById('usd-cny-rate');
            if (!rateDisplay) return;
            try {
                const response = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
                const data = await response.json();
                rateDisplay.innerText = data.rates.CNY.toFixed(4);
            } catch (e) { rateDisplay.innerText = "获取失败"; }
        }
        fetchExchangeRate();
        setInterval(fetchExchangeRate, 30000);

        // 淘宝时间同步
        let timeOffset = 0;

        async function syncGlobalTime() {
            try {
                const response = await fetch('https://api.m.taobao.com/rest/api3.do?api=mtop.common.getTimestamp');
                if (!response.ok) throw new Error("网络异常");
                const data = await response.json();
                const trueTime = parseInt(data.data.t);
                timeOffset = trueTime - Date.now();
            } catch (error) {
                timeOffset = 0;
            }
            updateTimezones();
        }

        syncGlobalTime();
        setInterval(syncGlobalTime, 1800000);

        // 时区渲染（两列布局，无时钟源）
        function updateTimezones() {
            const zones = [
                { name: "北京", tz: "Asia/Shanghai" },
                { name: "纽约", tz: "America/New_York" },
                { name: "伦敦", tz: "Europe/London" },
                { name: "巴黎", tz: "Europe/Paris" },
                { name: "莫斯科", tz: "Europe/Moscow" },
                { name: "利雅得", tz: "Asia/Riyadh" },
                { name: "迪拜", tz: "Asia/Dubai" },
                { name: "伊斯兰堡", tz: "Asia/Karachi" }
            ];
            const container = document.getElementById('timezone-grid');
            if (!container) return;

            const now = new Date(Date.now() + timeOffset);

            container.innerHTML = zones.map(z => {
                const str = now.toLocaleTimeString('zh-CN', { timeZone: z.tz, hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                const localHour = parseInt(now.toLocaleTimeString('en-US', { timeZone: z.tz, hour12: false, hour: '2-digit' }));
                const isWorking = localHour >= 9 && localHour < 18;
                const statusColor = isWorking ? 'text-cyan-400' : 'text-slate-500';
                return `<div class="bg-black/50 px-4 py-3 rounded border border-white/5 flex items-center justify-between">
                            <span class="text-sm text-slate-400">${z.name}</span>
                            <span class="font-mono text-base tracking-wider ${statusColor}">${str}</span>
                        </div>`;
            }).join('');
        }

        setInterval(updateTimezones, 1000);
    </script>
</body>
</html>
